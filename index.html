<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<title>Albion House</title>

<link href="https://fonts.cdnfonts.com/css/apple-ii-pro" rel="stylesheet">

<style>
:root {
  --amber: #ffb32c;
  --amber-bright: #ffd67f;
  --bg: #020201;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background: var(--bg);
}

body {
  color: var(--amber);
  font-family: 'Apple II Pro', 'Courier New', monospace;
  text-transform: uppercase;
  overflow: hidden;
  background:
    radial-gradient(circle at 34% 38%, rgba(255, 179, 44, 0.055), transparent 42%),
    #020201;
}

.screen {
  position: relative;
  min-height: 100vh;
  padding: clamp(36px, 7vw, 82px);
}

.screen::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,179,44,.05) 0px,
      rgba(255,179,44,.05) 1px,
      transparent 2px,
      transparent 4px
    );
  opacity: .48;
  mix-blend-mode: screen;
}

.screen::after {
  content: "";
  position: fixed;
  inset: -12%;
  pointer-events: none;
  background:
    radial-gradient(circle at 38% 43%, transparent 40%, rgba(0,0,0,.72) 80%);
}

main {
  position: relative;
  z-index: 1;
  max-width: 980px;
  font-size: clamp(18px, 2.25vw, 34px);
  line-height: 1.42;
  letter-spacing: .02em;
  text-shadow:
    0 0 3px rgba(255,179,44,.95),
    0 0 12px rgba(255,179,44,.3),
    0 0 24px rgba(255,179,44,.12);
  filter: blur(.12px);
  -webkit-font-smoothing: none;
  font-smooth: never;
}

.line {
  min-height: 1.42em;
  white-space: pre-wrap;
}

.spacer {
  height: 1.1em;
}

.title {
  color: var(--amber-bright);
  font-size: 1.12em;
  text-shadow:
    0 0 3px rgba(255,214,127,.95),
    0 0 14px rgba(255,214,127,.34);
}

.rule {
  color: var(--amber-bright);
  margin: .95em 0;
  white-space: nowrap;
  overflow: hidden;
}

a {
  color: var(--amber);
  text-decoration: none;
  display: block;
  width: fit-content;
}

a:hover,
a:focus {
  color: var(--amber-bright);
  outline: none;
  text-shadow:
    0 0 4px rgba(255,214,127,.95),
    0 0 16px rgba(255,214,127,.34);
}

.cursor {
  display: inline-block;
  width: .68em;
  height: .9em;
  margin-left: .16em;
  background: var(--amber);
  vertical-align: -.08em;
  box-shadow:
    0 0 5px rgba(255,179,44,.95),
    0 0 18px rgba(255,179,44,.35);
  animation: blink 1s steps(2,start) infinite;
}

@keyframes blink {
  0%,48% { opacity: 1; }
  49%,100% { opacity: 0; }
}

@media (max-width: 720px) {
  body {
    overflow: auto;
  }

  .screen {
    padding: 30px 20px 60px;
  }

  main {
    font-size: clamp(15px, 4.2vw, 21px);
    line-height: 1.35;
  }

  .line {
    min-height: 1.35em;
  }

  .title {
    font-size: 1em;
  }
}
</style>
</head>

<body>
<div class="screen">
  <main aria-label="Albion House Apple II style catalog">
    <div class="line">] CATALOG</div>

    <section id="content">
      <div class="spacer"></div>

      <div class="line title">ALBION HOUSE</div>
      <div class="line">EST. 1993 ON A COMPUTER FROM 1983</div>

      <div class="spacer"></div>

      <div class="line">TWO COUSINS SPENT SUMMERS MAKING GAMES IN A BASEMENT IN ALBION, NEBRASKA.</div>

      <div class="spacer"></div>

      <div class="line">WE'RE STILL MAKING THEM.</div>

      <div class="rule">----------------------------------------</div>

      <a href="https://joellueders.github.io/Killbox/killbox.html">KILLBOX.BAS [ALPHA]</a>
      <a href="about.html">ABOUT.TXT</a>
      <a href="mailto:hello@albionhouse.games">CONTACT.TXT</a>
      <div class="spacer"></div>

      <div class="line">READY.</div>
      <div class="line">]<span class="cursor"></span></div>
    </section>
  </main>
</div>


</body>
</html>
